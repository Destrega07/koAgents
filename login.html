<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - 可口可乐销售赋能中心</title>
    <style>
      :root {
        --coke-red: #f40009;
        --shadow: 0 28px 60px rgba(0, 0, 0, 0.25);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial;
        color: white;
        background: linear-gradient(180deg, #b80006 0%, var(--coke-red) 45%, #ff1a22 120%);
        overflow: hidden;
      }

      @keyframes ribbonShift {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-25%);
        }
      }

      .wrap {
        position: relative;
        height: 100%;
      }

      .center {
        position: relative;
        z-index: 1;
        height: 100%;
        display: grid;
        place-items: center;
        padding: 28px 18px 260px;
      }

      .box {
        width: min(420px, 100%);
      }

      .logo {
        display: grid;
        place-items: center;
        margin-bottom: 18px;
      }

      .logo img {
        width: 190px;
        height: auto;
      }

      .card {
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(14px);
        box-shadow: var(--shadow);
        padding: 18px;
      }

      .card h1 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0.08em;
      }

      .card p {
        margin: 6px 0 14px;
        font-size: 12px;
        opacity: 0.85;
      }

      label {
        display: block;
        font-size: 12px;
        opacity: 0.85;
        margin: 10px 0 6px;
      }

      input {
        width: 100%;
        height: 44px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.14);
        color: rgba(255, 255, 255, 0.96);
        padding: 0 14px;
        outline: none;
        font-size: 16px;
      }

      input::placeholder {
        color: rgba(255, 255, 255, 0.45);
      }

      input:focus {
        border-color: rgba(255, 255, 255, 0.38);
        box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.16);
      }

      .error {
        margin-top: 10px;
        font-size: 13px;
        display: none;
      }

      .error.show {
        display: block;
      }

      .submit {
        margin-top: 14px;
        width: 100%;
        height: 46px;
        border-radius: 16px;
        border: 0;
        background: white;
        color: var(--coke-red);
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 16px 24px rgba(0, 0, 0, 0.18);
      }

      .submit:active {
        transform: scale(0.99);
      }

      .slogan {
        margin-top: 16px;
        text-align: center;
        font-size: 12px;
        letter-spacing: 0.2em;
        opacity: 0.75;
      }

      .ribbon {
        pointer-events: none;
        position: absolute;
        inset-inline: 0;
        bottom: 0;
        opacity: 0.95;
      }

      .ribbon-inner {
        width: 200%;
        animation: ribbonShift 16s linear infinite;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="center">
        <div class="box">
          <div class="logo">
            <img id="brandLogo" src="/assets/logo.png" alt="Coca-Cola" />
          </div>
          <div class="card" id="loginCard">
            <h1>销售赋能中心</h1>
            <p>使用企业账号登录</p>

            <form id="loginForm">
              <label for="username">账号</label>
              <input id="username" autocomplete="username" inputmode="text" placeholder="请输入账号" />
              <label for="password">密码</label>
              <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
              <div id="errorText" class="error"></div>
              <button type="submit" class="submit">登录</button>
            </form>
          </div>
          <div class="slogan" id="slogan">DingSheng 2030 - 数智引领增长</div>
        </div>
      </div>

      <div class="ribbon" aria-hidden="true">
        <div class="ribbon-inner">
          <svg viewBox="0 0 1440 220" height="220" width="100%" preserveAspectRatio="none">
            <path
              fill="white"
              fill-opacity="1"
              d="M0,160 C240,110 420,210 720,160 C1020,110 1200,210 1440,160 L1440,240 L0,240 Z"
            >
              <animate
                attributeName="d"
                dur="10s"
                repeatCount="indefinite"
                values="
                M0,160 C240,110 420,210 720,160 C1020,110 1200,210 1440,160 L1440,240 L0,240 Z;
                M0,170 C260,220 460,90 720,170 C980,250 1180,110 1440,170 L1440,240 L0,240 Z;
                M0,160 C240,110 420,210 720,160 C1020,110 1200,210 1440,160 L1440,240 L0,240 Z
                "
              />
            </path>
          </svg>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const isLoggedIn = sessionStorage.getItem("isLoggedIn");
        if (isLoggedIn === "true") {
          window.location.replace("/");
          return;
        }

        const form = document.getElementById("loginForm");
        const username = document.getElementById("username");
        const password = document.getElementById("password");
        const errorText = document.getElementById("errorText");
        const logo = document.getElementById("brandLogo");
        const card = document.getElementById("loginCard");

        const showError = (msg) => {
          errorText.textContent = String(msg || "");
          errorText.classList.toggle("show", Boolean(errorText.textContent));
        };

        const runLoginTransition = () =>
          new Promise((resolve) => {
            if (!logo || !card) {
              resolve();
              return;
            }

            const rect = logo.getBoundingClientRect();
            const clone = logo.cloneNode(true);
            clone.id = "brandLogoFly";
            clone.style.position = "fixed";
            clone.style.left = rect.left + "px";
            clone.style.top = rect.top + "px";
            clone.style.width = rect.width + "px";
            clone.style.height = rect.height + "px";
            clone.style.zIndex = "60";
            clone.style.transformOrigin = "top left";
            clone.style.willChange = "transform, opacity";
            clone.style.transition = "transform 520ms cubic-bezier(0.2, 0.9, 0.2, 1), opacity 520ms ease";
            document.body.appendChild(clone);
            logo.style.opacity = "0";

            card.style.willChange = "transform, opacity";
            card.style.transition = "transform 360ms ease, opacity 360ms ease";
            card.style.opacity = "0";
            card.style.transform = "translateY(10px) scale(0.985)";

            const targetLeft = 24;
            const targetTop = 20;
            const targetHeight = 40;
            const scale = rect.height > 0 ? targetHeight / rect.height : 0.35;
            const dx = targetLeft - rect.left;
            const dy = targetTop - rect.top;

            requestAnimationFrame(() => {
              clone.style.transform = `translate(${dx}px, ${dy}px) scale(${scale})`;
            });

            setTimeout(resolve, 540);
          });

        form.addEventListener("submit", (e) => {
          e.preventDefault();
          const u = String(username.value || "").trim();
          const p = String(password.value || "").trim();
          if (u === "kosales" && p === "ds2030") {
            sessionStorage.setItem("isLoggedIn", "true");
            sessionStorage.setItem("postLoginAnim", "1");
            runLoginTransition().finally(() => window.location.replace("/"));
            return;
          }
          showError("账号或密码错误");
        });

        username.focus();
      })();
    </script>
  </body>
</html>
